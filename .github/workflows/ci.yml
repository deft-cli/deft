name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      # --- Toolchain: clang / llvm-ar (Linux) -----------------------------
      - name: Install clang + LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          clang --version
          ar --version

      # --- Toolchain: clang / llvm-ar / lib.exe (Windows) -----------------
      - name: Install clang + LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y --no-progress

      - name: Add LLVM to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # lib.exe/link.exe ship with the MSVC build tools, not LLVM — pull them
      # onto PATH so the archiver fallback chain has a real lib.exe to find.
      - name: Set up MSVC developer environment (Windows, for lib.exe)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify clang/llvm-ar/lib.exe are on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          clang --version
          llvm-ar --version
          where.exe lib.exe

      # --- Build & unit/integration tests ---------------------------------
      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --verbose

      # --- Integration sanity pass: run the real binary -------------------
      - name: deft doctor (sanity check)
        shell: bash
        run: cargo run --quiet -- doctor

      - name: deft sync (sanity check)
        shell: bash
        # Hits the live package-index registry over the network; treated as
        # advisory so transient network/registry hiccups don't fail the build.
        continue-on-error: true
        run: cargo run --quiet -- sync
